project:
  type: website
  output-dir: _site
  resources:
    - "assets/**"
  render:
    - "index.qmd"
    - "syllabus.qmd"
    - "parts/**/*.qmd"
    - "about.qmd"

website:
  title: "IChO 2026 Preparatory Problems — Solutions"
  description: "Solutions and pedagogical analysis for the 58th IChO (Uzbekistan, 2026) preparatory problems. Solutions are dynamic; please report errors on Discord."
  site-url: "https://archochen.github.io/icho2026pp/"
  repo-url: "https://github.com/archochen/icho2026pp"
  favicon: assets/favicon.svg
  repo-actions: [edit, issue]
  page-navigation: true
  back-to-top-navigation: true
  search:
    location: navbar
    type: overlay
  navbar:
    background: primary
    left:
      - text: "Home"
        href: index.qmd
      - text: "Syllabus"
        href: syllabus.qmd
      - about.qmd
    right:
      - icon: discord
        href: "https://discord.gg/CHANGE-ME"
        text: "Discord"
        aria-label: "Discuss on Discord"
  page-footer:
    left: 'Found an error? <strong><a href="https://discord.gg/CHANGE-ME">Open the Discord →</a></strong>'
    right: 'Solutions by <a href="https://dcho.us">Dr. Chen @ dcho.us</a> · CC BY-NC-SA 4.0'

format:
  html:
    theme:
      light: [cosmo, styles.scss]
      dark:  [darkly, styles.scss]
    css: styles.css
    toc: true
    toc-depth: 4
    toc-location: right
    code-copy: true
    code-overflow: wrap
    html-math-method:
      method: katex
    include-in-header:
      - text: |
          <!-- IChO 2026 PP favicons -->
          <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
          <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png">
          <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
          <meta name="theme-color" content="#2a2b80">
    include-after-body:
      - text: |
          <!-- mhchem for \ce{}. Must reload AFTER Quarto's own katex@latest script
               (added by html-math-method:katex), because that script overwrites
               window.katex and would clobber any mhchem extension attached before
               it. End-of-body defer position guarantees this runs after Quarto's
               katex@latest but before its DOMContentLoaded katex.render(...) call.
               Without this, every \ce{...} in the site renders with the macro
               name in red and the rest as plain italic math. -->
          <script defer src="https://cdn.jsdelivr.net/npm/katex@latest/dist/contrib/mhchem.min.js"></script>
    filters:
      - status-badge
      - q-headings
      - hide-cn-sections
    smooth-scroll: true
    link-external-newwindow: true

execute:
  freeze: auto      # Cache executed code-block outputs in _freeze/ so the CI
                    # build (no Python on the GH Actions runner) renders from
                    # the cache. To regenerate, run `quarto render <file.qmd>`
                    # locally with python3 + jupyter + matplotlib installed,
                    # then commit the updated _freeze/ directory.

  # Per-problem PDF — uncomment when you have a LaTeX engine and want printable handouts.
  # pdf:
  #   documentclass: scrartcl
  #   geometry: margin=2cm
  #   pdf-engine: xelatex
