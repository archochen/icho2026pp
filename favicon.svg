<?xml version="1.0" encoding="UTF-8"?>
<!--
  IChO 2026 Preparatory Problems Solutions — favicon.
  Based on the IChO 2026 logo's distinctive element: the red round-bottom
  flask that forms the "I" of "IChO". Designed to remain recognisable at
  16×16 px (browser tab) while reading as "chemistry" at any size.

  Colour: #C8102E (close match to the official IChO 2026 red).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="IChO 2026 flask">
  <!-- Round-bottom body of the flask -->
  <circle cx="32" cy="44" r="16" fill="#C8102E"/>

  <!-- Tall vertical neck -->
  <rect x="26" y="8" width="12" height="28" fill="#C8102E"/>

  <!-- Wider lip at the top of the neck -->
  <rect x="22" y="6" width="20" height="4" rx="1" fill="#C8102E"/>

  <!-- White liquid-surface highlight inside the body for depth -->
  <ellipse cx="27" cy="40" rx="3" ry="4" fill="#ffffff" opacity="0.35"/>
</svg>
