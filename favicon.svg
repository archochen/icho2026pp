<?xml version="1.0" encoding="UTF-8"?>
<!--
  IChO 2026 Preparatory Problems Solutions — favicon.
  "Uz" (Uzbekistan, ISO 3166 alpha-2 country code) stacked over "26" (the year).
  Set on a solid IChO-red rounded square so it stays legible as a small tab icon.

  Colour: #C8102E — sampled to match the red of the official IChO 2026
  wordmark (the "IChO" letters and the flask-shaped "I" share this red).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="IChO 2026 — Uzbekistan">
  <!-- Solid IChO-red rounded square background (iOS-style corner radius). -->
  <rect width="64" height="64" rx="10" fill="#C8102E"/>

  <!-- "Uz" — upper half. ISO country code, identifies Uzbekistan. -->
  <text x="32" y="29" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="24" font-weight="800" letter-spacing="-0.5"
        fill="#ffffff">Uz</text>

  <!-- "26" — lower half. The year. -->
  <text x="32" y="56" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="24" font-weight="800" letter-spacing="-0.5"
        fill="#ffffff">26</text>
</svg>
